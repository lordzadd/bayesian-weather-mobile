plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.example.bayesian_weather"
    compileSdk flutter.compileSdkVersion
    ndkVersion "26.1.10909125"

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = "1.8"
    }

    defaultConfig {
        applicationId "com.example.bayesian_weather"
        minSdk 26  // Vulkan API requires API 26+
        targetSdk flutter.targetSdkVersion
        versionCode flutter.versionCode
        versionName flutter.versionName

        // Native ExecuTorch build — disabled until libexecutorch.a is available.
        // App uses BmaDartEngine (pure Dart CPU inference) as fallback.
        // externalNativeBuild {
        //     cmake {
        //         cppFlags "-std=c++17"
        //         arguments "-DANDROID_STL=c++_shared"
        //         abiFilters "arm64-v8a", "x86_64"
        //     }
        // }
    }

    // externalNativeBuild {
    //     cmake {
    //         path "src/main/cpp/CMakeLists.txt"
    //         version "3.22.1"
    //     }
    // }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }

    // ExecuTorch prebuilt AAR
    repositories {
        flatDir { dirs "libs" }
    }
}

dependencies {
    // ExecuTorch Android AAR (place in android/app/libs/ after downloading)
    // implementation(name: "executorch", ext: "aar")
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.4"
}

flutter {
    source "../.."
}
