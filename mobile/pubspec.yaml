name: bayesian_weather
description: Hyper-local Bayesian weather forecasting at the edge.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # HTTP
  dio: ^5.4.0
  connectivity_plus: ^6.0.0

  # State management
  riverpod: ^2.5.0
  flutter_riverpod: ^2.5.0

  # Local persistence
  sqflite: ^2.3.0
  path: ^1.9.0
  path_provider: ^2.1.0

  # Native inference (ExecuTorch via FFI)
  ffi: ^2.1.0
  package_info_plus: ^8.0.0

  # Location
  geolocator: ^13.0.0

  # Utilities
  intl: ^0.19.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.8.0
  mockito: ^5.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
